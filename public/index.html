<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Streamer Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--tg-theme-bg-color, #f8f9fa);
      color: var(--tg-theme-text-color, #212121);
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      font-size: 16px;
      background-color: var(--tg-theme-secondary-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #212121);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: var(--tg-theme-button-color, #0088cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .video-container {
      margin-top: 20px;
      display: none;
    }
    .video-player {
      width: 100%;
      border-radius: 8px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      display: none;
    }
    .error {
      color: var(--tg-theme-destructive-text-color, #e53935);
      padding: 10px;
      border-radius: 8px;
      background-color: var(--tg-theme-destructive-color, #ffebee);
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Video Streamer</h1>
      <p>Watch TeraBox and DiskWala videos directly in Telegram</p>
    </div>
    
    <div class="input-group">
      <input type="text" id="videoUrl" class="input-field" placeholder="Paste TeraBox or DiskWala video URL here...">
    </div>
    
    <button id="extractBtn" class="btn">Extract & Watch Video</button>
    
    <div id="loading" class="loading">
      <p>Processing your video link... This may take a moment.</p>
    </div>
    
    <div id="error" class="error"></div>
    
    <div id="videoContainer" class="video-container">
      <video id="videoPlayer" class="video-player" controls>
        Your browser doesn't support HTML5 video.
      </video>
    </div>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // Get DOM elements
    const videoUrlInput = document.getElementById('videoUrl');
    const extractBtn = document.getElementById('extractBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const videoContainer = document.getElementById('videoContainer');
    const videoPlayer = document.getElementById('videoPlayer');
    
    // Add event listeners
    extractBtn.addEventListener('click', extractVideo);
    videoUrlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        extractVideo();
      }
    });
    
    // Extract video function
    async function extractVideo() {
      const url = videoUrlInput.value.trim();
      
      if (!url) {
        showError('Please enter a video URL');
        return;
      }
      
      if (!url.includes('terabox.com') && !url.includes('diskwala.com')) {
        showError('Please enter a valid TeraBox or DiskWala URL');
        return;
      }
      
      showLoading(true);
      hideError();
      hideVideo();
      
      try {
        // Get the server URL (adjust based on your deployment)
        const serverUrl = window.location.origin;
        
        // Extract video URL
        const response = await fetch(`${serverUrl}/api/extract-video?url=${encodeURIComponent(url)}`);
        const data = await response.json();
        
        if (response.ok) {
          // Get the proxy URL
          const proxyUrl = `${serverUrl}/api/video-proxy?url=${encodeURIComponent(data.videoUrl)}`;
          
          // Load the video
          videoPlayer.src = proxyUrl;
          showVideo();
          
          // Send a message to the bot
          tg.sendData(JSON.stringify({ action: 'video_extracted', url: url }));
        } else {
          showError(data.error || 'Failed to extract video');
        }
      } catch (err) {
        console.error('Error:', err);
        showError('An error occurred while processing your request');
      } finally {
        showLoading(false);
      }
    }
    
    // Helper functions
    function showLoading(show) {
      loading.style.display = show ? 'block' : 'none';
      extractBtn.disabled = show;
    }
    
    function showError(message) {
      error.textContent = message;
      error.style.display = 'block';
    }
    
    function hideError() {
      error.style.display = 'none';
    }
    
    function showVideo() {
      videoContainer.style.display = 'block';
    }
    
    function hideVideo() {
      videoContainer.style.display = 'none';
      videoPlayer.src = '';
    }
  </script>
</body>
</html>
